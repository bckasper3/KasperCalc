<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="wrapper">
      <div class="header">Inches of Fuel to PSI Calculator</div>

      <div class="group1">
        <label class="dropdownlabel" for="operation">Select<nobr> Fuel:</label>
        <span class="output">
          <select class="dropdown" id="operation" onchange="updateCalculator()">
            <option value="JetA">Jet A</option>
            <option value="JetB">Jet B</option>
            <option value="JP4">JP-4</option>
            <option value="JP5">JP-5</option>
            <option value="JP8">JP-8</option>
            <option value="AvGas">AvGas</option>
            <option value="StoddardSolvent">Stoddard Solvent</option>
          </select>
        </span>
      </div>

      <div class="group2">
        <span class="label">Inches of Fuel:</span>
        <span class="output inputbox">
          <input type="number" id="input1" oninput="calculate()" />
        </span>
      </div>

      <div class="group">
        <div>
          <span class="label">Specific Gravity (S.G.): </span>
          <span class="output" id="result_SG">&nbsp</span>
        </div>

        <div>
          <span class="label">Density (lb/gallon):</span>
          <span class="output" id="result_Density">&nbsp</span>
        </div>

        <div>
          <span class="label">Inches of Water (inH20):</span>
          <span class="output" id="result_InH2O">&nbsp</span>
        </div>
      </div>

      <div class="group result">
        <span class="label">Result (PSI):</span>
        <span class="output result" id="result_PSI">&nbsp</span>
      </div>
    </div>

    <script src="calculator.js"></script>
    <!-- Link to the external JS file -->
  </body>
</html>
