<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class = "body1">
    <div class="Header">Inches of Fuel to PSI Calculator</div>
    <div class="container">
      <div class="row1">
        <label class="dropdownlabel" for="operation">           Select<nobr> Fuel:</label>
        <select class = "dropdown" id="operation" onchange="updateCalculator()">
          <option value="JetA">Jet A</option>
          <option value="JetB">Jet B</option>
          <option value="JP4">JP-4</option>
          <option value="JP5">JP-5</option>
          <option value="JP8">JP-8</option>
          <option value="StoddardSolvent">Stoddard Solvent  </option>
        </select>
      </div>
      <div class="row2">
        <label class = "needscentered" for="input1">Inches of Fuel:</label>
        <input type="number" id="input1" size=10 oninput="calculate()" >
      </div>
      <div class = "intCalc">
        <div id="result_SG">Specific Gravity (S.G.):&nbsp&nbsp</div>
        <div id="result_Density">Density (lb/gallon):&nbsp&nbsp</div>
        <div id="result_InH2O">Inches of Water (inH20):&nbsp&nbsp</div>
      </div>
      <div id="result_PSI">Result (PSI):&nbsp&nbsp</div> 
    </div> 
    </div>

    <script src="calculator.js"></script>
    <!-- Link to the external JS file -->
  </body>
</html>
